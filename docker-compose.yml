services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend-data:/app/backend/data
    environment:
      - APP_ENV=${APP_ENV:-docker}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  backend-data:
